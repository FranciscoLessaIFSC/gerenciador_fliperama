<!DOCTYPE html>
<html lang="pt-BR" data-theme="client">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Arcade Manager - Dashboard</title>
	<link rel="preconnect" href="https://googleapis.com" />
	<link rel="preconnect" href="https://gstatic.com" crossorigin />
	<link href="https://googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="../styles.css" />
	<link rel="stylesheet" href="dashboard.css" />
</head>
<body>
	<header class="topbar">
		<h1 class="brand">Arcade Manager</h1>
		<div class="topbar-actions">
			<a href="/app/dashboard/ranking/" id="btn-ranking-link" class="btn btn-admin">Ranking</a>
			<a href="../index.html" class="btn btn-admin">Voltar</a>
		</div>
	</header>

	<!-- .dashboard-main recebe os estilos globais do topo do seu CSS -->
	<main class="dashboard-main">
		<section class="stats-grid" aria-label="Resumo do usuário">
			<article class="stat-card">
				<h2 class="stat-title">Score</h2>
				<p class="stat-value" id="card-score">0</p>
			</article>
			<article class="stat-card">
				<h2 class="stat-title">Credits</h2>
				<div class="stat-value-row">
					<p class="stat-value" id="card-balance">0</p>
					<!-- a tag <a> foi movida para dentro ou configurada para não quebrar o flex-row -->
					<a href="../credits.html" id="btn-buy-credits-link" style="display: contents;">
    					<button class="btn-buy-credits" type="button" aria-label="Buy credits">+</button>
					</a>
				</div>
			</article>
		</section>

		<section class="games-history" aria-label="Últimos jogos">
			<h2 class="history-title">Últimos 5 jogos</h2>
			<div class="table-wrap">
				<table class="games-table">
					<thead>
						<tr>
							<th>Game</th>
							<th>Score</th>
							<th>Date</th>
						</tr>
					</thead>
					<!-- ID adicionado para o JavaScript injetar as linhas reais da API -->
					<tbody id="games-history-rows">
						<!-- Linhas estáticas removidas para evitar flicker visual -->
					</tbody>
				</table>
			</div>
		</section>
	</main>

	<!-- Script de integração carregado após o DOM -->
	<script src="dashboard.js"></script>
</body>
</html>
