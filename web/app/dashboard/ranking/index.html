<!DOCTYPE html>
<html lang="pt-BR" data-theme="client">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Arcade Manager - Ranking</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="../../styles.css" />
	<link rel="stylesheet" href="../dashboard.css" />
	<link rel="stylesheet" href="ranking.css" />
</head>
<body>
	<header class="topbar">
		<h1 class="brand">Arcade Manager</h1>
		<div class="topbar-actions">
			<!-- Link de voltar ajustado para preservar o UID original na navegação caso exista -->
			<a href="#" id="btn-back-dashboard" class="btn btn-admin">voltar</a>
		</div>
	</header>

	<main class="ranking-main">
		<!-- Painel 1: Pontuação por Jogo -->
		<section class="ranking-panel" aria-label="Ranking de jogos">
			<div>
				<p class="ranking-kicker">Ranking</p>
				<h2 class="ranking-title">Pontuação por jogo</h2>
			</div>

			<label class="ranking-filter" for="gameFilter">
				<span class="ranking-filter-label">Jogo</span>
				<select id="gameFilter" class="ranking-select" name="gameFilter">
					<option value="all">Todos os jogos</option>
					<!-- Opções serão injetadas via API -->
				</select>
			</label>

			<div class="table-wrap">
				<table class="games-table">
					<thead>
						<tr>
							<th>Game</th>
							<th>Score</th>
							<th>Date</th>
						</tr>
					</thead>
					<tbody id="table-game-rows">
						<!-- Linhas dinâmicas via JS -->
					</tbody>
				</table>
			</div>
		</section>

		<br>

		<!-- Painel 2: Pontuação por Jogador -->
		<section class="ranking-panel" aria-label="Ranking de jogadores">
			<div>
				<p class="ranking-kicker">Ranking</p>
				<h2 class="ranking-title">Pontuação por Jogador</h2>
			</div>

			<div class="table-wrap">
				<table class="games-table">
					<thead>
						<tr>
							<th>Player</th>
							<th>Score</th>
							<th>Date</th>
						</tr>
					</thead>
					<tbody id="table-player-rows">
						<!-- Linhas dinâmicas via JS -->
					</tbody>
				</table>
			</div>
		</section>
	</main>

	<script src="ranking.js"></script>
</body>
</html>
