<!DOCTYPE html>
<html lang="pt-BR" data-theme="client">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Arcade Manager - Admin Funcionários</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="../styles.css" />
	<link rel="stylesheet" href="admin.css" />
	<style>
		/* Estilização para o Modal Nativo <dialog> acoplado ao tema escuro */
		.emp-modal {
			background: var(--color-bg-surface);
			border: 1px solid var(--color-border);
			border-radius: var(--radius-lg);
			color: var(--color-text-primary);
			padding: var(--space-6);
			width: min(420px, 100% - 32px);
			box-shadow: var(--shadow-xl);
		}
		.emp-modal::backdrop { background: rgba(0, 0, 0, 0.75); }
		.emp-form { display: grid; gap: var(--space-4); margin-top: var(--space-4); }
		.emp-form label { display: grid; gap: var(--space-1); font-size: 0.9rem; font-weight: 500; color: var(--color-text-secondary); }
		.emp-form input, .emp-form select {
			background: #0d1326; border: 1px solid var(--color-border); padding: var(--space-2);
			border-radius: var(--radius-md); color: #fff; font-family: inherit;
		}
		.emp-actions-row { display: flex; gap: var(--space-3); justify-content: flex-end; margin-top: var(--space-2); }
		.card-header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4); }
		.btn-edit-action { background: transparent; border: 1px solid var(--theme-primary); color: var(--theme-primary); cursor: pointer; padding: var(--space-1) var(--space-3); border-radius: var(--radius-md); font-weight: 500; }
	</style>
</head>
<body class="admin-body">
	<div class="admin-shell">
		<aside class="admin-sidebar" aria-label="Menu administrativo">
			<div class="sidebar-top">
				<a href="index.html" class="admin-brand">Menu Administrativo</a>
				<button type="button" class="sidebar-toggle" data-sidebar-toggle aria-label="Recolher menu">||</button>
			</div>
			<nav class="sidebar-menu">
				<a href="index.html" class="menu-link"><span class="menu-icon">DB</span><span class="menu-label">Dashboard</span></a>
				<a href="users.html" class="menu-link"><span class="menu-icon">US</span><span class="menu-label">Usuários</span></a>
				<a href="machines.html" class="menu-link"><span class="menu-icon">MC</span><span class="menu-label">Maquinas</span></a>
				<a href="reports.html" class="menu-link"><span class="menu-icon">RP</span><span class="menu-label">Relatórios</span></a>
                <a href="employees.html" class="menu-link is-active"><span class="menu-icon">FC</span><span class="menu-label">Funcionários</span></a>
				<a href="pagamento.html" class="menu-link"><span class="menu-icon">PG</span><span class="menu-label">Pagamento</span></a>
				<a href="promotion.html" class="menu-link"><span class="menu-icon">PR</span><span class="menu-label">Promoção</span></a>
				<a href="estoque.html" class="menu-link"><span class="menu-icon">ES</span><span class="menu-label">Estoque</span></a>
			</nav>
		</aside>

		<div class="admin-content-wrap">
			<header class="admin-topbar">
				<div class="admin-topbar-actions">
					<button type="button" class="sidebar-toggle sidebar-toggle-mobile" data-sidebar-toggle aria-label="Abrir menu">||</button>
					<h1 class="admin-topbar-title">Funcionários</h1>
				</div>
				<a href="../index.html" class="btn btn-admin">sair</a>
			</header>

			<main class="admin-main">
				<section class="admin-card" aria-label="Status dos funcionários">
					<div class="card-header-flex">
						<h2 style="margin: 0;">Controle de funcionários</h2>
						<button type="button" id="btn-open-create" class="btn btn-admin" style="font-size: 0.9rem;">+ Novo Funcionário</button>
					</div>
					<div class="admin-table-wrap">
						<table class="admin-table">
							<thead>
								<tr>
									<th>Nome</th>
									<th>Cargo</th>
									<th style="text-align: right;">Ações</th>
								</tr>
							</thead>
							<tbody id="admin-employees-rows">
								<!-- Conteúdo assíncrono via API -->
							</tbody>
						</table>
					</div>
				</section>
			</main>
		</div>
	</div>

	<!-- Modal de Criação / Edição de Funcionários -->
	<dialog id="empModal" class="emp-modal">
		<h3 id="modal-title-text" style="margin: 0; font-size: 1.3rem;">Novo Funcionário</h3>
		<form id="empForm" class="emp-form">
			<!-- Input oculto para armazenar o ID ao editar -->
			<input type="hidden" id="form-emp-id" value="">

			<label> Nome Completo
				<input type="text" id="form-name" required placeholder="Ex: Jordan Silva">
			</label>
			
			<!-- Bloco wrapper do e-mail (será ocultado dinamicamente ao editar) -->
			<div id="email-field-wrapper">
				<label> E-mail de Acesso
					<input type="email" id="form-email" placeholder="jordan@arcade.com">
				</label>
			</div>

			<label> Cargo / Função Administrativa
				<select id="form-role" required>
					<option value="CASHIER">Caixa</option>
					<option value="OPERATOR">Operador / Técnico</option>
					<option value="MANAGER">Gerente</option>
					<option value="ADMIN">Administrador</option>
				</select>
			</label>

			<div class="emp-actions-row">
				<button type="button" id="btn-close-modal" class="btn btn-admin" style="background: transparent; color: #fff; border: 1px solid var(--color-border);">Cancelar</button>
				<button type="submit" class="btn btn-admin">Salvar Colaborador</button>
			</div>
		</form>
	</dialog>

	<script src="admin.js"></script>
	<script src="admin-employees.js"></script>
</body>
</html>
