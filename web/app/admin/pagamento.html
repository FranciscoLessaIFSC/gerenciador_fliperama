<!DOCTYPE html>
<html lang="pt-BR" data-theme="client">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Arcade Manager - Admin Pagamentos</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="../styles.css" />
	<link rel="stylesheet" href="admin.css" />
	<style>
		.pay-modal {
			background: var(--color-bg-surface); border: 1px solid var(--color-border);
			border-radius: var(--radius-lg); color: var(--color-text-primary);
			padding: var(--space-6); width: min(420px, 100% - 32px); box-shadow: var(--shadow-xl);
		}
		.pay-modal::backdrop { background: rgba(0, 0, 0, 0.75); }
		.pay-form { display: grid; gap: var(--space-4); margin-top: var(--space-4); }
		.pay-form label { display: grid; gap: var(--space-1); font-size: 0.9rem; color: var(--color-text-secondary); }
		.pay-form input { background: #0d1326; border: 1px solid var(--color-border); padding: var(--space-2); border-radius: var(--radius-md); color: #fff; }
		.pay-actions-row { display: flex; gap: var(--space-3); justify-content: flex-end; }
		.btn-row-action { background: transparent; border: 1px solid var(--theme-primary); color: var(--theme-primary); cursor: pointer; padding: var(--space-1) var(--space-2); border-radius: var(--radius-md); font-size: 0.85rem; }
		.btn-row-delete { border-color: #ff5252; color: #ff5252; margin-left: 4px; }
	</style>
</head>
<body class="admin-body">
	<div class="admin-shell">
		<aside class="admin-sidebar" aria-label="Menu administrativo">
			<div class="sidebar-top">
				<a href="index.html" class="admin-brand">Menu Administrativo</a>
				<button type="button" class="sidebar-toggle" data-sidebar-toggle aria-label="Recolher menu">||</button>
			</div>
			<nav class="sidebar-menu">
				<a href="index.html" class="menu-link"><span class="menu-icon">DB</span><span class="menu-label">Dashboard</span></a>
				<a href="users.html" class="menu-link"><span class="menu-icon">US</span><span class="menu-label">Usuários</span></a>
				<a href="machines.html" class="menu-link"><span class="menu-icon">MC</span><span class="menu-label">Maquinas</span></a>
				<a href="reports.html" class="menu-link"><span class="menu-icon">RP</span><span class="menu-label">Relatórios</span></a>
                <a href="employees.html" class="menu-link"><span class="menu-icon">FC</span><span class="menu-label">Funcionários</span></a>
				<a href="pagamento.html" class="menu-link is-active"><span class="menu-icon">PG</span><span class="menu-label">Pagamento</span></a>
				<a href="promotion.html" class="menu-link"><span class="menu-icon">PR</span><span class="menu-label">Promoção</span></a>
				<a href="estoque.html" class="menu-link"><span class="menu-icon">ES</span><span class="menu-label">Estoque</span></a>
			</nav>
		</aside>

		<div class="admin-content-wrap">
			<header class="admin-topbar">
				<div class="admin-topbar-actions">
					<button type="button" class="sidebar-toggle sidebar-toggle-mobile" data-sidebar-toggle aria-label="Abrir menu">||</button>
					<h1 class="admin-topbar-title">Pagamentos</h1>
				</div>
				<a href="../index.html" class="btn btn-admin">sair</a>
			</header>

			<main class="admin-main">
				<section class="admin-card" aria-label="Folha de pagamentos">
					<h2>Controle de Folha Salarial</h2>
					<div class="admin-table-wrap">
						<table class="admin-table">
							<thead>
								<tr>
									<th>Funcionário</th>
									<th>Último Salário Pago</th>
									<th>Dados Bancários</th>
                                    <th>Horas Trabalhadas</th>
                                    <th>Faltas</th>
									<th style="text-align: right;">Ações</th>
								</tr>
							</thead>
							<tbody id="admin-payments-rows">
								<!-- Inserido dinamicamente via JS -->
							</tbody>
						</table>
					</div>
				</section>
			</main>
		</div>
	</div>

	<!-- Modal de Lançamento de Salário -->
	<dialog id="payModal" class="pay-modal">
		<h3 id="modal-title-text" style="margin:0;">Lançar Pagamento</h3>
		<form id="payForm" class="pay-form">
			<input type="hidden" id="form-employee-id" value="">
			<input type="hidden" id="form-transaction-id" value="">
			
			<label> Funcionário Selecionado
				<input type="text" id="form-emp-name" disabled style="opacity: 0.6;">
			</label>
			<label> Valor do Salário (R$)
				<input type="number" id="form-amount" min="1" step="0.01" required placeholder="1500.00">
			</label>
			<div class="pay-actions-row">
				<button type="button" id="btn-close-modal" class="btn btn-admin" style="background:transparent; border:1px solid var(--color-border); color:#fff;">Voltar</button>
				<button type="submit" class="btn btn-admin">Efetivar Lançamento</button>
			</div>
		</form>
	</dialog>

	<script src="admin.js"></script>
	<script src="admin-payments.js"></script>
</body>
</html>
