<!DOCTYPE html>
<html lang="pt-BR" data-theme="client">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Arcade Manager</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="styles.css" />
</head>
<body>
	<header class="topbar">
		<h1 class="brand">Arcade Manager</h1>
		<a href="#" class="btn btn-admin">admin page</a>
	</header>

	<main class="hero">
		<section class="entry-card" aria-label="Acesso de cartão">
			<form id="cardAccessForm" action="/dashboard" method="get">
				<label class="entry-label" for="cardNumber">Informe o número do seu cartão</label>
				<div class="entry-row">
					<input
						class="card-input"
						id="cardNumber"
						name="cardNumber"
						type="text"
						inputmode="numeric"
						autocomplete="off"
						placeholder="Ex.: 123456"
						required
					/>
					<button class="btn btn-enter" type="submit">Enter</button>
				</div>
			</form>
		</section>
	</main>
	<script src="index.js"></script>
</body>
</html>
